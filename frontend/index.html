<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pre-diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>
            <p class="text-blue-100 text-sm">Assistant pre-diagnostic medical</p>
        </div>
    </header>

    <!-- CONTENU PRINCIPAL -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Colonne gauche : formulaire -->
            <div id="form-section" class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Symptomes du patient</h2>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Âge</label>
                    <input type="number" id="age"
                           class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                           placeholder="Ex: 28" min="0" max="120">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
                    <select id="sexe" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="F">Féminin</option>
                        <option value="M">Masculin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Température (°C)</label>
                    <input type="number" id="temperature" step="0.1"
                           class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                           placeholder="Ex: 38.5" min="35" max="42">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tension systolique</label>
                    <input type="number" id="tension_sys"
                           class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                           placeholder="Ex: 120" min="60" max="250">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Symptômes</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="toux" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Toux</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="fatigue" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Fatigue</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="maux_tete" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Maux de tête</span>
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Région</label>
                    <select id="region" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="Dakar">Dakar</option>
                        <option value="Thies">Thiès</option>
                        <option value="Saint-Louis">Saint-Louis</option>
                        <option value="Ziguinchor">Ziguinchor</option>
                        <option value="Tambacounda">Tambacounda</option>
                        <option value="Kaolack">Kaolack</option>
                        <option value="Diourbel">Diourbel</option>
                        <option value="Fatick">Fatick</option>
                        <option value="Kolda">Kolda</option>
                        <option value="Matam">Matam</option>
                    </select>
                </div>

                <button onclick="diagnostiquer()" id="btn-diag"
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md">
                    Diagnostiquer
                </button>
            </div>

            <!-- Colonne droite : résultat -->
            <div id="result-section">
                <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
                    <p class="text-4xl mb-3">🩺</p>
                    <p class="font-medium">Remplissez le formulaire</p>
                    <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
                </div>
            </div>

        </div>

        <!-- Historique des consultations -->
        <div id="historique-section" class="mt-6"></div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.4 - ESP/UCAD - L2 GLSI 2026
    </footer>

    <!-- JAVASCRIPT -->
    <script>
const API_URL = "";
const historique = [];

// ====================================
// FONCTION PRINCIPALE
// ====================================
async function diagnostiquer() {
    const patient = {
        age:         parseInt(document.getElementById("age").value),
        sexe:        document.getElementById("sexe").value,
        temperature: parseFloat(document.getElementById("temperature").value),
        tension_sys: parseInt(document.getElementById("tension_sys").value),
        toux:        document.getElementById("toux").checked,
        fatigue:     document.getElementById("fatigue").checked,
        maux_tete:   document.getElementById("maux_tete").checked,
        region:      document.getElementById("region").value
    };

    if (!patient.age || !patient.temperature || !patient.tension_sys) {
        afficherErreur("Veuillez remplir tous les champs (âge, température, tension).");
        return;
    }

    afficherChargement();

    try {
        const response = await fetch(API_URL + "/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patient)
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail ? JSON.stringify(err.detail) : "Erreur serveur");
        }

        const resultat = await response.json();
        afficherResultat(resultat);

    } catch (error) {
        afficherErreur("Erreur de connexion : " + error.message);
    }
}

// ====================================
// AFFICHER LE SPINNER
// ====================================
function afficherChargement() {
    document.getElementById("result-section").innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-500">Analyse en cours...</p>
        </div>`;
}

// ====================================
// AFFICHER LE RÉSULTAT + EXPLICATION LLM
// ====================================
function afficherResultat(r) {
    const couleurs = {
        paludisme: { bg: "bg-red-100",    text: "text-red-800",    bar: "bg-red-500",    badge: "bg-red-500"    },
        grippe:    { bg: "bg-orange-100", text: "text-orange-800", bar: "bg-orange-500", badge: "bg-orange-500" },
        typhoide:  { bg: "bg-yellow-100", text: "text-yellow-800", bar: "bg-yellow-500", badge: "bg-yellow-500" },
        sain:      { bg: "bg-green-100",  text: "text-green-800",  bar: "bg-green-500",  badge: "bg-green-500"  }
    };

    const icones = {
        paludisme: "🦟",
        grippe:    "🤧",
        typhoide:  "🤒",
        sain:      "✅"
    };

    const icone = icones[r.diagnostic] || "🩺";
    const c     = couleurs[r.diagnostic] || couleurs["sain"];
    const pct   = Math.round(r.probabilite * 100);

    document.getElementById("result-section").innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Résultat</h2>

            <!-- Diagnostic principal -->
            <div class="${c.bg} rounded-lg p-4 mb-4">
                <p class="text-sm text-gray-600">Diagnostic :</p>
                <p class="text-2xl font-bold ${c.text} uppercase mt-1">${icone} ${r.diagnostic}</p>
            </div>

            <!-- Barre de probabilité -->
            <div class="mb-4">
                <div class="flex justify-between mb-1">
                    <span class="text-sm text-gray-600">Probabilité</span>
                    <span class="text-sm font-bold ${c.text}">${pct}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div class="${c.bar} h-3 rounded-full transition-all duration-500"
                         style="width: ${pct}%"></div>
                </div>
            </div>

            <!-- Badge confiance -->
            <div class="flex items-center gap-2 mb-3">
                <span class="${c.badge} text-white text-xs px-2 py-1 rounded-full">${r.confiance}</span>
                <span class="text-sm text-gray-600">confiance</span>
            </div>

            <!-- Message -->
            <div class="bg-gray-50 rounded-lg p-3 mb-4">
                <p class="text-sm text-gray-700">${r.message}</p>
                <p class="text-xs text-gray-400 mt-1 italic">Ce pré-diagnostic ne remplace pas un avis médical.</p>
            </div>

            <!-- Zone explication LLM (placeholder) -->
            <div id="explication-zone">
                <div class="mt-2 bg-purple-50 rounded-lg p-4 border border-purple-200">
                    <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                    <p class="text-gray-500 text-sm animate-pulse">Génération en cours...</p>
                </div>
            </div>

        </div>`;

    // Ajouter à l'historique
    historique.unshift({
        diagnostic:  r.diagnostic,
        probabilite: pct,
        confiance:   r.confiance,
        icone:       icone
    });
    if (historique.length > 5) historique.pop();
    afficherHistorique();

    // Appeler /explain automatiquement
    demanderExplication(r);
}

// ====================================
// APPELER /explain ET AFFICHER
// ====================================
async function demanderExplication(r) {
    const explainData = {
        diagnostic:  r.diagnostic,
        probabilite: r.probabilite,
        age:         parseInt(document.getElementById("age").value),
        sexe:        document.getElementById("sexe").value,
        temperature: parseFloat(document.getElementById("temperature").value),
        region:      document.getElementById("region").value
    };

    try {
        const response = await fetch(API_URL + "/explain", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(explainData)
        });

        if (response.ok) {
            const result = await response.json();
            const region = document.getElementById('region').value;

            document.getElementById("explication-zone").innerHTML = `
                <div class="mt-2 bg-purple-50 rounded-lg p-4 border border-purple-200">
                    <p class="text-sm text-purple-600 font-medium mb-2">
                        Explication (Llama 3)
                    </p>
                    <p class="text-gray-700 text-sm leading-relaxed">
                        ${result.explication}
                    </p>
                </div>

                <!-- MODIFICATION 1 : Avertissement médical -->
                <div class="mt-3 bg-red-50 border border-red-300 rounded-lg p-3 flex items-start gap-2">
                    <span class="text-red-500 text-lg">⚠️</span>
                    <div>
                        <p class="text-red-700 text-sm font-bold">
                            Avertissement important
                        </p>
                        <p class="text-red-600 text-xs mt-1">
                            Cette explication est générée par une IA et ne remplace
                            pas un avis médical professionnel. Ne vous auto-médicamentez
                            JAMAIS sans consulter un médecin.
                        </p>
                    </div>
                </div>

                <!-- MODIFICATION 2 : Bouton centre de santé -->
                <div class="mt-3">
                    <a href="https://www.google.com/maps/search/centre+de+sante+${region}+Senegal"
                       target="_blank"
                       class="w-full flex items-center justify-center gap-2 bg-green-600
                              text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700
                              transition duration-200">
                        🏥 Trouver un centre de santé à ${region}
                    </a>
                    <p class="text-xs text-gray-400 text-center mt-1">
                        Consultez un professionnel de santé dès que possible
                    </p>
                </div>`;
        }
    } catch (error) {
        document.getElementById("explication-zone").innerHTML = `
            <div class="mt-2 bg-gray-50 rounded-lg p-3">
                <p class="text-gray-400 text-sm">Explication non disponible.</p>
            </div>`;
    }
}

// ====================================
// AFFICHER L'HISTORIQUE
// ====================================
function afficherHistorique() {
    const section = document.getElementById("historique-section");

    const lignes = historique.map((c, i) => `
        <tr class="border-t border-gray-100">
            <td class="py-2 px-3 text-sm text-gray-600">${i + 1}</td>
            <td class="py-2 px-3 text-sm font-medium">${c.icone} ${c.diagnostic.toUpperCase()}</td>
            <td class="py-2 px-3 text-sm">${c.probabilite}%</td>
            <td class="py-2 px-3 text-sm">${c.confiance}</td>
        </tr>
    `).join("");

    section.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📋 Historique des consultations</h2>
            <table class="w-full">
                <thead>
                    <tr class="bg-gray-50">
                        <th class="py-2 px-3 text-left text-xs text-gray-500">#</th>
                        <th class="py-2 px-3 text-left text-xs text-gray-500">Diagnostic</th>
                        <th class="py-2 px-3 text-left text-xs text-gray-500">Probabilité</th>
                        <th class="py-2 px-3 text-left text-xs text-gray-500">Confiance</th>
                    </tr>
                </thead>
                <tbody>${lignes}</tbody>
            </table>
        </div>`;
}

// ====================================
// AFFICHER UNE ERREUR
// ====================================
function afficherErreur(msg) {
    document.getElementById("result-section").innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-xl p-6">
            <p class="text-red-700 font-medium">${msg}</p>
            <p class="text-red-500 text-sm mt-2">Vérifiez votre connexion et réessayez.</p>
        </div>`;
}
    </script>

</body>
</html>
